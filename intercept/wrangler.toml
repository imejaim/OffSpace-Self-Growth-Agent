# Required secrets (set via: wrangler secret put <KEY>):
# - PORTONE_TEST_SECRET_KEY
# - PORTONE_WEBHOOK_SECRET
# - PAYPAL_CLIENT_SECRET
# - GEMINI_API_KEY
# - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY (public, can stay in [vars] if needed)

name = "intercept"
main = ".open-next/worker.js"
compatibility_date = "2026-04-11"
compatibility_flags = ["nodejs_compat"]

# Static assets (public/ 폴더 — 캐릭터 SVG, favicon 등)
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Workers AI binding for Gemma 4 model access
[ai]
binding = "AI"

# KV namespace for distributed rate limiting across Cloudflare isolates
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "7ee3f4f54f414f3bb2529ade0f207580"

# Custom domain — routes traffic from interceptnews.app to this Worker
routes = [
  { pattern = "interceptnews.app", custom_domain = true },
  { pattern = "www.interceptnews.app", custom_domain = true }
]

# workers.dev 서브도메인도 유지 (디버깅용)
workers_dev = true

[vars]
NEXT_PUBLIC_SITE_URL = "https://interceptnews.app"
NEXT_PUBLIC_BASE_URL = "https://interceptnews.app"
NEXT_PUBLIC_SUPABASE_URL = "https://ptbumikpnehlbxsbhmsx.supabase.co"
NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY = "sb_publishable_P0-gx7EwZI5klunBPzg6EQ_kNVRWocI"
