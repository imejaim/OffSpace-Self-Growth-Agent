# Required secrets (set via: wrangler versions secret put <KEY>):
# - PORTONE_WEBHOOK_SECRET
# - PAYPAL_CLIENT_SECRET
# - PAYPAL_WEBHOOK_ID
# - GEMINI_API_KEY
# - CRON_SECRET

name = "intercept"
main = ".open-next/worker.js"
compatibility_date = "2026-04-11"
compatibility_flags = ["nodejs_compat"]

# workers.dev 서브도메인 차단 (2026-04-14)
# true로 두면 *.workers.dev 서브도메인이 공개되어 봇/크롤러가 쿼터를 태움.
# 커스텀 도메인(interceptnews.app) 하나만 공개 엔드포인트로 유지.
workers_dev = false

# Custom domain — routes traffic from interceptnews.app to this Worker
routes = [
  { pattern = "interceptnews.app", custom_domain = true },
  { pattern = "www.interceptnews.app", custom_domain = true }
]

# Cron triggers — daily/monthly usage counter resets
[triggers]
crons = [
  "0 15 * * *",   # 00:00 KST daily reset   (15:00 UTC)
  "0 15 1 * *"    # 00:00 KST monthly reset  (15:00 UTC on 1st of month)
]

# Static assets (public/ 폴더 — 캐릭터 SVG, favicon 등)
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Workers AI binding for Gemma 4 model access
[ai]
binding = "AI"

# KV namespace for distributed rate limiting across Cloudflare isolates
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "7ee3f4f54f414f3bb2529ade0f207580"

