<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Offspace Characters</title>
<style>
  body { background: #0d0d1a; color: white; font-family: monospace; display: flex; flex-direction: column; align-items: center; gap: 40px; padding: 40px; }
  .character { text-align: center; }
  .character h2 { margin-bottom: 12px; font-size: 20px; }
  .character p { color: #888; font-size: 14px; margin-top: 8px; }
  .row { display: flex; gap: 60px; align-items: flex-end; }
  img { image-rendering: pixelated; width: 200px; height: auto; }
</style>
</head>
<body>
<h1>Offspace Team Characters</h1>
<div class="row">
  <div class="character">
    <h2 style="color:#D4764E">코부장</h2>
    <img src="Ko-bujang.svg" alt="코부장">
    <p>Claude / Orange / Senior</p>
  </div>
  <div class="character">
    <h2 style="color:#4CAF50">오과장</h2>
    <img src="Oh-gwajang.svg" alt="오과장">
    <p>Codex / Green / Mid-level</p>
  </div>
  <div class="character">
    <h2 style="color:#5C6BC0">젬대리</h2>
    <img src="Jem-daeri.svg" alt="젬대리">
    <p>Gemini / Blue / Junior</p>
  </div>
</div>
</body>
</html>
